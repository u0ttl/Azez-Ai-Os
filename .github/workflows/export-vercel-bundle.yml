name: Export Azez AI OS Vercel Bundle

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "**"
  push:
    branches: [launch-hardening-0.12.0]
    paths:
      - "**"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout launch branch
        uses: actions/checkout@v4

      - name: Verify deploy source
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json
          test -f scripts/vercel-bootstrap.mjs
          test -f scripts/vercel-unified-build.mjs
          test -f Azez_AI_OS_v0.11.0_Signed.zip
          test -d overrides
          test -f apps/web/components/azez-desktop.tsx

      - name: Create complete deploy archive
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='azez-ai-os-vercel-bundle.tgz' \
            -czf azez-ai-os-vercel-bundle.tgz .

      - name: Upload deploy archive
        uses: actions/upload-artifact@v4
        with:
          name: azez-ai-os-vercel-bundle
          path: azez-ai-os-vercel-bundle.tgz
          if-no-files-found: error
          retention-days: 7
