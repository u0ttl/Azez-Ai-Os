name: Validate full Azez AI OS

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [ci/full-system-build]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract signed project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .extract-ai-os
          mkdir -p .extract-ai-os
          unzip -q Azez_AI_OS_v0.11.0_Signed.zip -d .extract-ai-os
          test -f .extract-ai-os/azez-ai-os/package.json
          test -d .extract-ai-os/azez-ai-os/apps/web
          test -d .extract-ai-os/azez-ai-os/apps/api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm db:generate

      - name: Typecheck
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm typecheck

      - name: Test
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm test

      - name: Build
        working-directory: .extract-ai-os/azez-ai-os
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/v1
        run: pnpm build
