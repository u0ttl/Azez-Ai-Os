name: Validate and publish full Azez AI OS

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [ci/full-system-build]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract signed project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .extract-ai-os
          mkdir -p .extract-ai-os
          unzip -q Azez_AI_OS_v0.11.0_Signed.zip -d .extract-ai-os
          test -f .extract-ai-os/azez-ai-os/package.json
          test -d .extract-ai-os/azez-ai-os/apps/web
          test -d .extract-ai-os/azez-ai-os/apps/api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm db:generate

      - name: Typecheck
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm typecheck

      - name: Test
        working-directory: .extract-ai-os/azez-ai-os
        run: pnpm test

      - name: Build
        working-directory: .extract-ai-os/azez-ai-os
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/v1
        run: pnpm build

      - name: Publish extracted source branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/ci/full-system-build'
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_DIR="$PWD/.extract-ai-os/azez-ai-os"
          TEMP_PUBLISH="$RUNNER_TEMP/azez-ai-os-publish"
          rm -rf "$TEMP_PUBLISH"
          mkdir -p "$TEMP_PUBLISH"
          rsync -a --exclude='.env' --exclude='node_modules/' --exclude='.next/' "$SOURCE_DIR"/ "$TEMP_PUBLISH"/

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout --orphan release-full-system
          git rm -rf .
          rsync -a "$TEMP_PUBLISH"/ ./
          git add -A
          git commit -m 'Publish validated Azez AI OS source'
          git push --force origin HEAD:release/full-system
