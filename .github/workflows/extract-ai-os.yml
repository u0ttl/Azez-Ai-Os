name: Extract and prepare Azez AI OS

on:
  workflow_dispatch:
  push:
    paths:
      - 'Azez_AI_OS_v0.11.0_Signed.zip'
      - '.github/workflows/extract-ai-os.yml'

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract signed project
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE='Azez_AI_OS_v0.11.0_Signed.zip'
          TEMP_DIR='.extract-ai-os'
          test -f "$ARCHIVE"

          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"
          unzip -q "$ARCHIVE" -d "$TEMP_DIR"

          SOURCE_DIR="$TEMP_DIR/azez-ai-os"
          test -f "$SOURCE_DIR/package.json"
          test -d "$SOURCE_DIR/apps"

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name "$TEMP_DIR" \
            ! -name "$ARCHIVE" \
            -exec rm -rf {} +

          rsync -a \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='.env' \
            "$SOURCE_DIR"/ ./

          rm -rf "$TEMP_DIR"
          rm -f "$ARCHIVE"

      - name: Commit extracted project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A

          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi

          git commit -m 'Deploy signed Azez AI OS source'
          git push origin HEAD:main
