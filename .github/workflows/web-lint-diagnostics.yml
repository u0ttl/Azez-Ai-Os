name: AZEZ Web Lint Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/web-lint-diagnostics.yml"
      - "scripts/vercel-bootstrap.mjs"
      - "overrides/components/browser-tools-workspace.tsx"
      - "overrides/components/browser-tools-workspace.module.css"
  push:
    branches: [launch-hardening-0.12.0]
    paths:
      - ".github/workflows/web-lint-diagnostics.yml"
      - "scripts/vercel-bootstrap.mjs"
      - "overrides/components/browser-tools-workspace.tsx"
      - "overrides/components/browser-tools-workspace.module.css"

permissions:
  contents: read

jobs:
  lint-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build and install dependencies
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
      - name: Capture web lint output
        shell: bash
        run: |
          set +e
          npx --yes pnpm@11.7.0 exec eslint app components lib --ignore-pattern 'app/api/v1/**' --max-warnings=0 > web-lint.log 2>&1
          code=$?
          cat web-lint.log
          printf 'LINT_EXIT_CODE=%s\n' "$code" >> web-lint.log
          exit 0
      - name: Upload web lint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: azez-web-lint-log
          path: web-lint.log
          retention-days: 1
