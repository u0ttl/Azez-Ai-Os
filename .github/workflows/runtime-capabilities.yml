name: AZEZ Runtime Capability Check

on:
  workflow_dispatch:
  push:
    branches: [launch-hardening-0.12.0]
    paths:
      - ".github/workflows/runtime-capabilities.yml"

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Report configured secret capabilities
        env:
          VERCEL_TOKEN_PRESENT: ${{ secrets.VERCEL_TOKEN != '' }}
          VERCEL_ORG_ID_PRESENT: ${{ secrets.VERCEL_ORG_ID != '' }}
          VERCEL_PROJECT_ID_PRESENT: ${{ secrets.VERCEL_PROJECT_ID != '' }}
          DATABASE_URL_PRESENT: ${{ secrets.DATABASE_URL != '' }}
          REDIS_URL_PRESENT: ${{ secrets.REDIS_URL != '' }}
          SESSION_SECRET_PRESENT: ${{ secrets.SESSION_SECRET != '' }}
          OPENAI_API_KEY_PRESENT: ${{ secrets.OPENAI_API_KEY != '' }}
          SMTP_HOST_PRESENT: ${{ secrets.SMTP_HOST != '' }}
          SMTP_PASSWORD_PRESENT: ${{ secrets.SMTP_PASSWORD != '' }}
          S3_ENDPOINT_PRESENT: ${{ secrets.S3_ENDPOINT != '' }}
          S3_ACCESS_KEY_PRESENT: ${{ secrets.S3_ACCESS_KEY != '' }}
          S3_SECRET_KEY_PRESENT: ${{ secrets.S3_SECRET_KEY != '' }}
        run: |
          printf '%s\n' \
            "VERCEL_TOKEN=$VERCEL_TOKEN_PRESENT" \
            "VERCEL_ORG_ID=$VERCEL_ORG_ID_PRESENT" \
            "VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_PRESENT" \
            "DATABASE_URL=$DATABASE_URL_PRESENT" \
            "REDIS_URL=$REDIS_URL_PRESENT" \
            "SESSION_SECRET=$SESSION_SECRET_PRESENT" \
            "OPENAI_API_KEY=$OPENAI_API_KEY_PRESENT" \
            "SMTP_HOST=$SMTP_HOST_PRESENT" \
            "SMTP_PASSWORD=$SMTP_PASSWORD_PRESENT" \
            "S3_ENDPOINT=$S3_ENDPOINT_PRESENT" \
            "S3_ACCESS_KEY=$S3_ACCESS_KEY_PRESENT" \
            "S3_SECRET_KEY=$S3_SECRET_KEY_PRESENT"
