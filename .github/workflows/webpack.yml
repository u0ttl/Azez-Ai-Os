name: AZEZ AI OS Preview CI

on:
  push:
    branches:
      - main
      - launch-hardening-0.12.0
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: azez-preview-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Unified production build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Verify bootstrap inputs
        run: |
          test -f package.json
          test -f Azez_AI_OS_v0.11.0_Signed.zip
          test -f scripts/vercel-bootstrap.mjs
          test -f scripts/vercel-unified-build.mjs

      - name: Build AZEZ AI OS 0.12.0
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: VERCEL_TOKEN present
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: echo configured
      - name: VERCEL_TOKEN absent
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: echo missing

      - name: VERCEL_ORG_ID present
        if: ${{ secrets.VERCEL_ORG_ID != '' }}
        run: echo configured
      - name: VERCEL_ORG_ID absent
        if: ${{ secrets.VERCEL_ORG_ID == '' }}
        run: echo missing

      - name: VERCEL_PROJECT_ID present
        if: ${{ secrets.VERCEL_PROJECT_ID != '' }}
        run: echo configured
      - name: VERCEL_PROJECT_ID absent
        if: ${{ secrets.VERCEL_PROJECT_ID == '' }}
        run: echo missing

      - name: DATABASE_URL present
        if: ${{ secrets.DATABASE_URL != '' }}
        run: echo configured
      - name: DATABASE_URL absent
        if: ${{ secrets.DATABASE_URL == '' }}
        run: echo missing

      - name: REDIS_URL present
        if: ${{ secrets.REDIS_URL != '' }}
        run: echo configured
      - name: REDIS_URL absent
        if: ${{ secrets.REDIS_URL == '' }}
        run: echo missing

      - name: SESSION_SECRET present
        if: ${{ secrets.SESSION_SECRET != '' }}
        run: echo configured
      - name: SESSION_SECRET absent
        if: ${{ secrets.SESSION_SECRET == '' }}
        run: echo missing
