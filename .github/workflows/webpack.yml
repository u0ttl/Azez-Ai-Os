name: AZEZ AI OS Preview CI

on:
  push:
    branches:
      - main
      - launch-hardening-0.12.0
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: azez-preview-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Unified build, security, lint, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Verify bootstrap inputs
        run: |
          test -f package.json
          test -f Azez_AI_OS_v0.11.0_Signed.zip
          test -f scripts/vercel-bootstrap.mjs
          test -f scripts/vercel-unified-build.mjs
          test -f scripts/validate-interface-layout.mjs

      - name: Build AZEZ AI OS 0.12.0
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Validate desktop and phone interface
        run: node scripts/validate-interface-layout.mjs

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azez-preview-build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 1

      - name: Audit production dependencies
        id: audit
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes pnpm@11.7.0 audit --prod --audit-level=moderate 2>&1 | tee audit.log

      - name: Upload security diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azez-preview-audit-log
          path: audit.log
          if-no-files-found: warn
          retention-days: 1

      - name: Lint web application
        run: |
          set -o pipefail
          npx --yes pnpm@11.7.0 exec eslint app components lib --ignore-pattern 'app/api/v1/**' --max-warnings=0 2>&1 | tee lint-web.log

      - name: Upload web lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azez-preview-web-lint-log
          path: lint-web.log
          if-no-files-found: warn
          retention-days: 1

      - name: Lint API application
        run: npx --yes pnpm@11.7.0 --filter @azez/api lint

      - name: Run API unit tests
        run: npx --yes pnpm@11.7.0 --filter @azez/api test

      - name: Run web unit tests
        run: npx --yes pnpm@11.7.0 exec vitest run lib/api-client.spec.ts lib/operations.spec.ts lib/product.spec.ts

      - name: Enforce security gate
        if: steps.audit.outcome == 'failure'
        run: |
          echo "Production dependency audit failed. Review azez-preview-audit-log."
          exit 1
