name: AZEZ AI OS Preview CI

on:
  push:
    branches:
      - main
      - launch-hardening-0.12.0
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: azez-preview-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Unified production build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Verify bootstrap inputs
        run: |
          test -f package.json
          test -f Azez_AI_OS_v0.11.0_Signed.zip
          test -f scripts/vercel-bootstrap.mjs
          test -f scripts/vercel-unified-build.mjs

      - name: Build AZEZ AI OS 0.12.0
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Preview deployment credentials preflight
        env:
          HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          HAS_VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID != '' }}
          HAS_VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID != '' }}
          HAS_DATABASE_URL: ${{ secrets.DATABASE_URL != '' }}
          HAS_REDIS_URL: ${{ secrets.REDIS_URL != '' }}
          HAS_SESSION_SECRET: ${{ secrets.SESSION_SECRET != '' }}
        run: |
          echo "VERCEL_TOKEN configured: ${HAS_VERCEL_TOKEN}"
          echo "VERCEL_ORG_ID configured: ${HAS_VERCEL_ORG_ID}"
          echo "VERCEL_PROJECT_ID configured: ${HAS_VERCEL_PROJECT_ID}"
          echo "DATABASE_URL configured: ${HAS_DATABASE_URL}"
          echo "REDIS_URL configured: ${HAS_REDIS_URL}"
          echo "SESSION_SECRET configured: ${HAS_SESSION_SECRET}"
